name: Linux Standalone Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "src/**"
      - "public/**"
      - "prisma/**"
      - "package-linux.sh"

jobs:
  build-linux-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build and Package
        env:
          NODE_OPTIONS: --max-old-space-size=2048
        run: |
          chmod +x package-linux.sh
          ./package-linux.sh

      - name: Locate Package
        id: pkg
        run: |
          PKG=$(ls -1t jarvis-web-linux-standalone-*.tar.gz | head -n 1)
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          ls -lh "$PKG"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-standalone-package
          path: ${{ steps.pkg.outputs.package }}
          if-no-files-found: error
